name: Compatibility / routing report
description: Report a site that was routed to the wrong engine or poorly explained
title: "[routing] "
labels:
  - compatibility
body:
  - type: input
    id: url
    attributes:
      label: Site URL
      placeholder: https://example.com
    validations:
      required: true
  - type: dropdown
    id: chosen_engine
    attributes:
      label: Engine chosen by hybrid
      options:
        - obscura
        - chrome
    validations:
      required: true
  - type: dropdown
    id: expected_engine
    attributes:
      label: Engine that should have been chosen
      options:
        - obscura
        - chrome
    validations:
      required: true
  - type: textarea
    id: probe_output
    attributes:
      label: Probe output
      description: Paste `check` or `check --json` output
      render: text
    validations:
      required: true
  - type: textarea
    id: symptoms
    attributes:
      label: Symptoms observed
      description: Missing styles, broken forms, anti-bot flow, wrong fallback, unclear reasons, etc.
    validations:
      required: true
